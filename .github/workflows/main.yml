name: Publish QGIS Plugin

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        run: |
          # Works for both push.tag and release events
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Extracted version: $VERSION"

      - name: Update metadata.txt version
        run: |
          sed -i "s/^version=.*/version=$VERSION/" espace_collaboratif/metadata.txt
          echo "Updated metadata.txt version to $VERSION"

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Rename plugin folder to match plugins.qgis.org package name
        run: |
          cp -r espace_collaboratif ign_espace_collaboratif
          sed -i "s|plugin_path: espace_collaboratif|plugin_path: ign_espace_collaboratif|" .qgis-plugin-ci

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and release plugin
        run: |
          qgis-plugin-ci release "$VERSION" \
            --release-tag "${{ github.ref_name }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --osgeo-username "${{ secrets.OSGEO_USER }}" \
            --osgeo-password "${{ secrets.OSGEO_PASSWORD }}" \
            --create-plugin-repo \
            --allow-uncommitted-changes